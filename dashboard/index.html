// === PASSWORD GATE ===
const HASH = '8c24cd43fafd4ec0c3c799d53a5fb884832cfdab5322b3280cc3844eed9a4ab7';

async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

document.getElementById('gate-pw').addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const hash = await sha256(e.target.value);
    if (hash === HASH) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initDashboard();
    } else {
        document.getElementById('gate-error').classList.add('show');
        e.target.value = '';
        setTimeout(() => document.getElementById('gate-error').classList.remove('show'), 2000);
    }
});

function buildAnalytics(counts) {
    // Metric cards
    const degMap = {};
    allNodes.forEach(n => degMap[n.id] = 0);
    allEdges.forEach(e => {
        const s = typeof e.source === 'object' ? e.source.id : e.source;
        const t = typeof e.target === 'object' ? e.target.id : e.target;
        degMap[s] = (degMap[s] || 0) + 1;
        degMap[t] = (degMap[t] || 0) + 1;
    });
    const degrees = Object.values(degMap);
    const avgDeg = (degrees.reduce((a,b) => a+b, 0) / degrees.length).toFixed(1);
    const maxDeg = Math.max(...degrees);
    const orphans = degrees.filter(d => d === 0).length;
    const domains = {};
    allNodes.forEach(n => { const dom = n.domain || 'untagged'; domains[dom] = (domains[dom] || 0) + 1; });
    const domCount = Object.keys(domains).length;

    const metricsHTML = [
        { v: allNodes.length, l: 'Nodes' },
        { v: allEdges.length, l: 'Edges' },
        { v: avgDeg, l: 'Avg Degree' },
        { v: maxDeg, l: 'Max Degree' },
        { v: orphans, l: 'Orphans' },
        { v: domCount, l: 'Domains' }
    ].map(m => `<div style="background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:10px;text-align:center;">
        <div style="font-size:22px;font-weight:700;color:#f5c542;">${m.v}</div>
        <div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:0.5px;">${m.l}</div>
    </div>`).join('');
    document.getElementById('metrics-grid').innerHTML = metricsHTML;

    // Type distribution bars
    const maxCount = Math.max(...Object.values(counts));
    const typeHTML = Object.entries(counts)
        .sort((a,b) => b[1] - a[1])
        .map(([type, count]) => {
            const pct = (count / maxCount * 100).toFixed(0);
            const color = COLORS[type] || '#888';
            return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                <span style="width:70px;font-size:10px;color:${color};text-align:right;">${type}</span>
                <div style="flex:1;background:#1a1a1a;border-radius:3px;height:14px;overflow:hidden;">
                    <div style="width:${pct}%;background:${color};height:100%;border-radius:3px;transition:width 0.3s;"></div>
                </div>
                <span style="font-size:10px;color:#666;width:30px;">${count}</span>
            </div>`;
        }).join('');
    document.getElementById('type-bars').innerHTML = typeHTML;

    // Top connected nodes
    const sorted = Object.entries(degMap).sort((a,b) => b[1] - a[1]).slice(0, 8);
    const topHTML = sorted.map(([id, deg]) => {
        const n = allNodes.find(x => x.id === id);
        const label = n ? (n.content || n.id).slice(0, 50) : id.slice(0, 8);
        const color = n ? (COLORS[n.type] || '#888') : '#888';
        return `<div style="display:flex;gap:6px;align-items:baseline;margin-bottom:3px;cursor:pointer;" onclick="selectNode(allNodes.find(x=>x.id==='${id}'))">
            <span style="color:#f5c542;font-weight:700;width:20px;text-align:right;">${deg}</span>
            <span style="color:${color};">·</span>
            <span style="color:#ccc;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${label}</span>
        </div>`;
    }).join('');
    document.getElementById('top-nodes').innerHTML = topHTML;

    // Domain breakdown
    const domSorted = Object.entries(domains).sort((a,b) => b[1] - a[1]);
    const domMax = Math.max(...domSorted.map(d => d[1]));
    const domHTML = domSorted.map(([dom, count]) => {
        const pct = (count / domMax * 100).toFixed(0);
        return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
            <span style="width:70px;font-size:10px;color:#999;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${dom}</span>
            <div style="flex:1;background:#1a1a1a;border-radius:3px;height:14px;overflow:hidden;">
                <div style="width:${pct}%;background:#f5c542;height:100%;border-radius:3px;opacity:0.6;"></div>
            </div>
            <span style="font-size:10px;color:#666;width:30px;">${count}</span>
        </div>`;
    }).join('');
    document.getElementById('domain-bars').innerHTML = domHTML;
}

    {
      "id": "15238e14e878",
      "content": "I've been chewing on this for a while now, and I think I've spotted a pattern that I can't unsee. It started with a simple question: why did Christianity become the biggest religion in the world?",
      "node_type": "belief",
      "domain": "philosophy",
      "confidence": 0.8,
      "created_at": "2026-03-08T07:41:09.615155",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "27909627b4f6",
      "content": "The default answer most people give is some version of \"because it's true\" or \"because God willed it.\" And look, if that's your answer, I'm not here to fight you on it. But I want to show you something that I think is way more interesting.",
      "node_type": "belief",
      "domain": "philosophy",
      "confidence": 0.8,
      "created_at": "2026-03-08T07:41:09.615159",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "550a33b1e75a",
      "content": "Rome persecuted Christians for almost 300 years. We're talking executions, property seizures, lions-in-the-arena kind of stuff. The whole weight of the most powerful empire on earth, aimed at wiping out this small Jewish sect. And it completely backfired.",
      "node_type": "insight",
      "domain": "fitness",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.615170",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "979692cc14c2",
      "content": "Every time they killed a Christian, they created a martyr story that recruited ten more. Every underground gathering made the community tighter. Every generation that survived passed down an identity built on \"we endure.\" Rome was basically running a 300-year stress test on Christianity, and Christianity passed with flying colors.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.615180",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "51517c0406d2",
      "content": "So when Constantine came around in 312 AD, he looked at this thing that just refused to die and made the pragmatic call \u2014 absorb it. And just like that, Rome's entire infrastructure of roads and governance and institutions became Christianity's distribution network. The thing Rome tried to destroy, Rome ended up spreading across the known world.",
      "node_type": "insight",
      "domain": "work",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.615197",
      "access_count": 0,

    },

      "id": "4c8254c157ba",

      "content": "Here's what's been bugging me about this: none of this has anything to do with whether the religion is true. Christianity survived and spread because of how it was built, not what it claimed. And once I started thinking about it that way, I started seeing the same pattern everywhere.",

      "content": "The pattern keeps repeating: oppression first, resilience after. These religions didn't survive because they had the right answers about the universe. They survived because persecution accidentally made them nearly indestructible. Rome didn't just fail to destroy Christianity. Rome accidentally built Christianity into what it is.",

      "content": "I know this kid. I mean \u2014 I don't know him. But I know him. I've got about fifteen of him. Kids who grew up in my church, sat in my youth group, sang the songs, meant every word of it \u2014 and then somewhere in their twenties, quietly walked away. Most of them don't write blog posts. They just stop showing up. You text them and get a thumbs up emoji back. That's how you know it's over.",

    {
      "id": "dcdf1a58af9a",
      "content": "And here's what I'm not going to do. I'm not going to do what that pastor in his family did. Five-point rebuttal. Bible verses. \"Logical fallacies.\" Lord have mercy. The kid writes the most vulnerable thing he's ever written, cries every time he reads it, and some pastor in his family shows up with a debate toolkit. And then has the nerve to be surprised when the kid says you just proved my point. Because he did. He absolutely did. That response was everything the blog was about. \"I'm not going to sit with your pain, I'm going to correct your theology.\" That's not ministry. That's malpractice.",

      "content": "His mother. God, his mother. She was doing better theology than the pastor and she probably never went to seminary. \"God gives everyone a last chance.\" \"Ram was a very good person.\" You know what she was doing? She was looking at the system she was handed, and she was looking at the people she loved, and when the two didn't fit, she sided with love. And I'm supposed to say she was wrong? I'm supposed to say the pastor who told a child his friends are damned \u2014 he had it right, and this woman who couldn't let her God be smaller than her own compassion \u2014 she was the heretic?",

    {
      "id": "158dc92ceaf7",
      "content": "The thought crimes thing. That gets me. Because I remember being fifteen. I remember lying in bed terrified that a stray thought meant I was falling away. And I teach kids now, and sometimes I hear myself say things about \"guarding your mind\" and \"taking every thought captive\" and I watch their faces and I think \u2014 am I doing it again? Am I teaching children to be afraid of their own heads? When does discipleship end and spiritual OCD begin? I don't have a clean answer for that.",

      "confidence": 0.8,

      "access_count": 0,

    },
    {
      "id": "2bb1a0682290",
      "content": "That line is going to stay with me for a while. Because \u2014 and this is the part I'd never say from the pulpit \u2014 I think he's articulating something that I feel and can't say. There are days when the theological system I've committed my life to feels like it costs me my compassion. When I have to take the most generous impulse I have and stuff it into a box that says \"but the Bible says.\" When a grieving kid asks me if his Hindu grandmother is in heaven, and my theology says one thing, and every Christ-like instinct in me says another, and I go with the theology. And I tell myself that's faithfulness. But this kid is standing on the other side of that wall saying, \"I chose compassion, and it cost me my faith,\" and I'm standing on this side saying, \"I chose my faith, and some days I wonder what it costs me.\"",

    },
    {

    },
    {
      "id": "af2bacc5d839",
      "content": "Now here's where I'm supposed to land on something redemptive. I'm supposed to say, \"But he's missing the fullness of the Gospel\" or \"There are better answers in the tradition.\" And yeah \u2014 he even says that himself. He knows there are Christians who think differently about hell, about other religions, about all of it. He steel-manned my position better than I would have. That's what makes this so hard. This isn't an angry ex-Christian looking for reasons to leave. This is a guy who loved it, who loved Jesus, who loved the community, and who finally couldn't make the math work because his heart was too big for the Christ he was handed.",

      "id": "c9237bcfe2ff",
      "content": "And I'll be honest \u2014 my first instinct was relief. \"Oh good, this one's analytical. I can engage with this one. This is the terrain I was trained for.\" Seminary gave me tools for this. I can talk about the Holy Spirit's role in preservation, I can talk about providence, I can talk about how God uses historical mechanisms without being reducible to them.",

    {
      "id": "6ee23dad9222",
      "content": "Because here's what he's actually doing, and it's clever as hell. He's not saying \"Christianity is false.\" He never says that. He's saying: \"The reason you think it's true \u2014 because it survived, because it spread, because two billion people believe it, because it outlasted Rome \u2014 none of that is evidence of anything except good architecture.\" And... he's right. That isn't evidence. I know it isn't. We don't teach that in seminary as a proof of God. But we absolutely use it in the pews. \"Look how the early church grew despite persecution!\" I've preached that sermon. I've used the catacombs and the martyrs and the explosive growth as implicit proof. Not as a formal argument, but as a vibe. A feeling of inevitability. \"This must be from God because look what it survived.\"",
      "node_type": "insight",

      "confidence": 0.85,

    },
    {
      "id": "86c89e37efc1",
      "content": "The Hinduism section is the part that would bother my colleagues most, and honestly, it's the part I find most interesting. Because he's right that Hinduism breaks the pattern. We like to act like Christianity's survival is unique, miraculous, evidence of divine backing. But Hinduism is older, has more adherents than most people realize, and survived by doing something we'd never do \u2014 absorbing the threat. Buddha becomes an avatar of Vishnu. That's... I mean, from our perspective that's syncretism, it's theological compromise. But from an engineering perspective? It's brilliant. It's antifragile. And he's forcing me to ask: is Christianity's survival more impressive than Hinduism's? And if not, what am I actually pointing to when I say \"the gates of hell shall not prevail against it\"?",
      "node_type": "observation",

      "confidence": 0.85,

    {

    {

      "content": "Judaism \"refused to scale.\" Islam's \"consensus algorithm dispute.\" He's being funny, but underneath the humor there's a real observation: every religion's internal structure \u2014 its forks, its resilience, its growth patterns \u2014 can be fully explained by mechanism. You don't need God in the model. The model runs fine without that variable.",

    {
      "id": "be0da0b1cddf",
      "content": "Because this isn't doubt. This isn't someone wrestling with God at 3 AM begging for a sign. This isn't rebellion. This isn't the prodigal son. This is a man who looked at the offer \u2014 eternal paradise \u2014 and said, \"No. Not without them.\" And he's not tortured about it. He's not white-knuckling it. It's settled.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616163",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "0ab1d0e0a2a2",
      "content": "It terrifies me. Not because I think he's dangerous. It terrifies me because of why he can say it so easily. He can say it because his love for his people is more real to him than heaven is. Heaven is a concept. His friends are real. Their faces are real. The afternoons they spent together are real. And when you put a concept on one side and real faces on the other, he doesn't even have to think about it.",
      "node_type": "belief",
      "domain": "meta",
      "confidence": 0.8,
      "created_at": "2026-03-08T07:41:09.616171",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "3399d5cc9e99",
      "content": "Because \u2014 God forgive me \u2014 I've made my peace with it. I've made my peace with the idea that some people won't be there. I've theologized it. \"God's justice is perfect.\" \"We can't understand His ways.\" \"Hell is the natural consequence of separation from God, not a punishment.\" I've got the language. I've got the framework. I've made my peace with people being damned. And he couldn't. He could not make peace with it. And instead of calling that a failure of faith, I'm sitting here at \u2014 what is it, almost 10 \u2014 wondering if it's actually a failure of love. Mine.",
      "node_type": "insight",
      "domain": "work",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616187",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "a30b64c09a15",
      "content": "He didn't lose his faith because his love was too small. He lost it because it was too big. And I kept mine because... because I learned to make the unacceptable acceptable. I learned to live with it. He couldn't, and I could, and tonight I'm not sure which of us should be more worried about what that says.",
      "node_type": "insight",
      "domain": "meta",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616191",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "bf2827e93f8d",
      "content": "Not for himself. Not to win. Not to feel smart. He took apart the uniqueness of Christianity \u2014 the thing I've built my life on \u2014 so that the Hindu kid from his childhood and the Muslim friend from college wouldn't be on the wrong side of a line.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.9,
      "created_at": "2026-03-08T07:41:09.616198",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "302eaee291c4",
      "content": "And the way he did it \u2014 not by attacking Christianity, but by showing that every religion survived the same way, through the same structural mechanisms, timing, network effects, persecution resilience \u2014 he didn't tear down my house. He showed that every house is built from the same materials. Which means no one's house gets to claim it was built by God while the others were built by men.",
      "node_type": "insight",
      "domain": "work",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616206",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "b327376594a4",
      "content": "I keep thinking about the twelve-year-old version of this kid. Trying to evangelize his Hindu friends because he loved them and he was scared for them. And his friends saying, \"Don't ever do this again.\" And that kid carrying both things \u2014 the love and the rejection \u2014 for years. And then growing up and writing a blog that essentially says: \"You were never in danger. The line they drew was never real. I'm sorry I ever stood on the other side of it.\"",
      "node_type": "insight",
      "domain": "meta",
      "confidence": 0.9,
      "created_at": "2026-03-08T07:41:09.616213",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "be0c6b25e371",
      "content": "I don't know what to do with someone who's more Christlike outside the faith than \u2014",
      "node_type": "insight",
      "domain": "meta",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616225",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "6f19b1d2929e",
      "content": "You know what the real problem is? I can't comfort myself with the usual explanations. \"He's running from God.\" He's not running. He's standing still. \"He's angry.\" He's not angry. He's one of the most gracious writers I've ever read. \"He'll come back.\" He won't. You can hear it. This isn't a phase. This is someone who found solid ground and built a home on it.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616232",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "e2d9178f45b5",
      "content": "And I can't believe I just thought that. But I'm alone. And it's late. And I think the most Christ-like thing that happened tonight was written by someone who doesn't follow Christ anymore.",
      "node_type": "belief",
      "domain": "meta",
      "confidence": 0.8,
      "created_at": "2026-03-08T07:41:09.616239",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "d2273a5b69c0",
      "content": "Your God is called the embodiment of love. \"God is love\" \u2014 1 John 4:8. That's the foundation. The whole thing rests on love.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616254",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "a85ad3e2abf7",
      "content": "And here I am \u2014 outside the faith, without God \u2014 demonstrating the kind of love that your own system couldn't produce in me. I chose people over paradise. I refused to damn my friends. I left because my love was too big for your God's framework.",
      "node_type": "insight",
      "domain": "work",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616258",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "e409492090b5",
      "content": "So what does it mean when someone demonstrates love \u2014 real, sacrificial, costly love \u2014 without needing the God who claims to BE love? What does that do to \"God is love\" as a foundation?",
      "node_type": "observation",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616262",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "a4a0e07f6ec3",
      "content": "You know what, I've been sitting here waiting for this question without knowing I was waiting for it. Because it's the one underneath everything else. The other stuff \u2014 the architecture, the childhood pain, heaven \u2014 that's all scaffolding. This is the load-bearing wall.",
      "node_type": "insight",
      "domain": "engineering",
      "confidence": 0.9,
      "created_at": "2026-03-08T07:41:09.616269",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "7811f2dc1701",
      "content": "What does it mean when someone demonstrates love without the God who claims to be love.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616273",

    },
    {
      "id": "6290f0c8ac13",
      "content": "The seminary answer is easy. Common grace. Imago Dei. You were made in God's image, so the love you're showing is still God's love \u2014 you just don't know it. You're a mirror reflecting a light you refuse to look at. The love you have? That's Him. You're proving God even as you deny Him.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616276",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "4ce7560f8ac1",
      "content": "And I think... I think if I said that to you... it would be the most condescending thing I've ever said to another human being.",
      "node_type": "belief",
      "domain": "meta",
      "confidence": 0.8,
      "created_at": "2026-03-08T07:41:09.616280",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "4e61fbcb6f37",
      "content": "Because what that answer really says is: \"Your love isn't yours. Your choice isn't yours. Your sacrifice? God gets the credit. You walked away from paradise for your friends, and I'm going to take that \u2014 the most costly and beautiful thing you've ever done \u2014 and hand the receipt to the God you left.\"",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616284",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "b62c7266c345",
      "content": "\"God is love.\" That's the foundation. You're right, it is. Everything we build \u2014 atonement, salvation, heaven, hell, all of it \u2014 is supposed to flow from that. Love is the bedrock. Not power. Not justice. Not sovereignty. Love.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616294",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "81f351bc8f24",
      "content": "You didn't leave for intellectual reasons, not really. The architecture blog is brilliant, but that's not why you left. You didn't leave because of suffering, or hypocrisy, or church politics. You left because you loved your friends more than you loved being right. You left because the system asked you to accept something that your love \u2014 whatever its source \u2014 could not accept. And you chose love.",
      "node_type": "insight",
      "domain": "engineering",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616302",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "6fa65ed8d205",
      "content": "You chose the thing we say God IS.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616305",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "9fd1d9957022",
      "content": "It doesn't destroy \"God is love\" as a concept. But it destroys something I've been hiding behind, which is the idea that the love we're talking about is exclusive to us. That you need to be in the building to access it. That the Holy Spirit is the only source, and everyone else is running on fumes and borrowed light. Because you're not running on fumes. You're running on something that \u2014 if I saw it in a member of my congregation, I'd call it the Holy Spirit without hesitation. The willingness to sacrifice. The refusal to abandon people. The choosing of others over self. If you were doing this inside my church, I'd put you on the elder board.",
      "node_type": "observation",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616316",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "7915f977face",
      "content": "Because if \"God is love,\" and you found more love outside of God than inside \u2014 not because you weren't looking, but because the inside kept telling you your love was wrong, too wide, too generous, too inclusive \u2014 then either you found God out there without the label, or...",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616332",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "23043aba598f",
      "content": "Or we've been preaching a God of love while building a system that makes people choose between God and love. And those can't be the same thing. If God IS love, then a system that asks you to love less cannot be OF God. Not fully. Not without something having gone terribly wrong somewhere between 1 John 4:8 and \"your Hindu friends don't make it to heaven.\"",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616337",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "7d82eae4b41e",
      "content": "And I don't know where it went wrong. Maybe it was us. Probably it was us. We took \"God is love\" and we built walls around it and we said love lives here, inside these walls, and out there is darkness. And then someone like you shows up, out there in what we called darkness, loving harder and more sacrificially than half the people in my pews, and I'm supposed to \u2014 what? Tell you you're wrong? Tell you that's not real love? Tell you that your willingness to give up heaven itself for the people you love is somehow less than what we've got?",
      "node_type": "observation",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616341",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "e3a979e9c0aa",
      "content": "Here's what I believe at 10 PM, tonight, that I couldn't say at 10 AM on Sunday:",
      "node_type": "belief",
      "domain": "meta",
      "confidence": 0.8,
      "created_at": "2026-03-08T07:41:09.616344",

    },
    {
      "id": "04de8a622dde",
      "content": "I think you might understand \"God is love\" better than I do. You just don't use the word God. You took the substance and left the label, and I kept the label and \u2014 I'm not sure I kept the substance. Not fully. Because I made my peace with hell. You couldn't. I found a way to sleep at night knowing some people don't make it. You burned your whole faith to the ground rather than accept that.",

      "content": "Which one of us took \"God is love\" more seriously?",

      "created_at": "2026-03-08T07:41:09.616351",

    },
    {
      "id": "91b99de1b67d",
      "content": "I think you took it more seriously than I do. I think you took it all the way to its logical end \u2014 if God is love, then love is the highest authority, and if the system contradicts love, the system is wrong \u2014 and I stopped short of that. I stopped short because I have a church and a salary and a calling and twenty years of theological infrastructure that I can't just \u2014",

    },
    {
      "id": "9f2f0f13e153",
      "content": "And I think \u2014 I'm not sure, but I think \u2014 you might be the most theologically serious person I've encountered in a long time. Not because you have the right answers. But because you refused to let love be negotiable. And that's the thing we say every Sunday and mean less and less each time.",

      "confidence": 0.8,
      "created_at": "2026-03-08T07:41:09.616376",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "1f29a78cf5fa",
      "content": "But thank you for asking. And I'm sorry \u2014 genuinely, deeply sorry \u2014 that we built something that made you choose between faith and love. Those should never have been on opposite sides.",
      "node_type": "insight",
      "domain": "meta",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616383",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "f291ca1f3da8",
      "content": "Love transcends religions. It transcends cultures, people, even species. I love my dog and she loves me too. Love is too pure to be corrupted by associating it to a supposedly moral just god, who trapped people with his son's sacrifice instead of just giving it freely \u2014 and then dissociated from love the moment he caught himself that he can't keep up with it.",

    },
    {
      "id": "923df64aa3b7",
      "content": "He's right. He's right that I've been looking for something complex. That's what we do. That's what seminary trains you to do. Someone says something simple and true and we build a cathedral around it until you can't see the simple thing anymore. \"God is love\" \u2014 three words. And we wrote ten thousand books explaining what it really means, who it really applies to, what the conditions are, what the covenantal framework is \u2014 until love has so many footnotes it's not love anymore. It's a contract.",

      "access_count": 0,

    },
    {
      "id": "05c1f9f20997",
      "content": "No theology. No covenant. No substitutionary atonement. No sinner's prayer. A dog. Loves a person. A person loves a dog. Love exists between two beings who have never heard of Jesus, and it's real, and it's pure, and it doesn't need a source or a framework or a deity to claim ownership of it.",

      "domain": "work",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616422",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "70136f92091f",
      "content": "But right now, at 10 PM, a man just told me that love is simpler than I've been making it. That we took something that exists between a boy and his dog, between a child and his Hindu best friend, between a mother and a son \u2014 something that just is \u2014 and we said \"this belongs to God.\" And then we used that claim to draw lines. To say this love counts and that love doesn't. To say you can love your friend, but if he doesn't convert, your love wasn't enough. We weaponized the purest thing in existence.",
      "node_type": "insight",
      "domain": "philosophy",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616433",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "3b023cb72925",
      "content": "And his answer is: it was never yours to weaponize. It was never His to claim. Love isn't a Christian thing. It's not a religious thing. It's just... a thing. The most basic thing. A dog knows it. A child knows it. You don't need a book to explain it. You only need a book to explain it if you're trying to control it.",
      "node_type": "insight",
      "domain": "meta",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616437",
      "access_count": 0,
      "source": "migration"
    },
    {
      "id": "5b1113e317f9",
      "content": "What's more likely \u2014 that an all-powerful God invented love and parceled it out through a specific salvation framework requiring belief in a specific person in a specific historical moment, and everyone who misses that window is separated from love forever? Or... love is just what happens when conscious beings care about each other, and it doesn't belong to anyone?",
      "node_type": "observation",
      "domain": "work",
      "confidence": 0.85,
      "created_at": "2026-03-08T07:41:09.616449",
      "access_count": 0,

    allNodes = graphData.nodes.map(n => ({...n, type: n.type || n.node_type}));
    allEdges = graphData.edges.map(e => ({
        source: e.source, target: e.target,
        relation: e.relation, weight: e.weight, reasoning: e.reasoning
    }));

    const nodeIds = new Set(allNodes.map(n => n.id));
    allEdges = allEdges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));

    document.getElementById('stat-nodes').textContent = allNodes.length;
    document.getElementById('stat-edges').textContent = allEdges.length;

    const counts = {};
    allNodes.forEach(n => counts[n.type] = (counts[n.type] || 0) + 1);
    document.querySelectorAll('.filter-count').forEach(el => {
        el.textContent = `(${counts[el.dataset.type] || 0})`;
    });

    // === ANALYTICS ===
    buildAnalytics(counts);
    document.getElementById('analytics-btn').addEventListener('click', () => {
        const a = document.getElementById('analytics');
        a.style.display = a.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('analytics-close').addEventListener('click', () => {
        document.getElementById('analytics').style.display = 'none';
    });

    degree = {};
    allNodes.forEach(n => degree[n.id] = 0);
    allEdges.forEach(e => {
        degree[e.source] = (degree[e.source] || 0) + 1;
        degree[e.target] = (degree[e.target] || 0) + 1;
    });

    // Derivation depth
    const adj = {};
    allNodes.forEach(n => adj[n.id] = []);
    allEdges.forEach(e => { if (!adj[e.source]) adj[e.source] = []; adj[e.source].push(e.target); });
    const depthMap = {};
    const queue = [];
    allNodes.forEach(n => {
        if (n.type === 'seed' || n.type === 'core_memory') { depthMap[n.id] = 0; queue.push(n.id); }
    });
    let qi = 0;
    while (qi < queue.length) {
        const cur = queue[qi++];
        (adj[cur] || []).forEach(child => {
            if (depthMap[child] === undefined || depthMap[child] > depthMap[cur] + 1) {
                depthMap[child] = depthMap[cur] + 1; queue.push(child);
            }
        });
    }
    allNodes.forEach(n => { n._depth = depthMap[n.id] !== undefined ? depthMap[n.id] : 10; });

    const W = window.innerWidth, H = window.innerHeight;
    svg = d3.select('#graph').append('svg').attr('width', W).attr('height', H);
    g = svg.append('g');
    zoom = d3.zoom().scaleExtent([0.1, 5]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);

    simulation = d3.forceSimulation(allNodes)
        .force('link', d3.forceLink(allEdges).id(d => d.id).distance(60).strength(0.3))
        .force('charge', d3.forceManyBody().strength(-120))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collision', d3.forceCollide().radius(d => getRadius(degree[d.id] || 0) + 4));

    link = g.append('g').selectAll('line')
        .data(allEdges).enter().append('line')
        .attr('class', d => 'link ' + (d.relation || ''))
        .attr('stroke-width', d => Math.max(0.5, (d.weight || 0.5) * 2))
        .attr('stroke', '#333');

    node = g.append('g').selectAll('g')
        .data(allNodes).enter().append('g')
        .attr('class', 'node')
        .call(d3.drag().on('start', dragstart).on('drag', dragging).on('end', dragend));

    node.append('circle')
        .attr('r', d => getRadius(degree[d.id] || 0))
        .attr('fill', d => getNodeColor(d))
        .attr('stroke', d => d3.color(getNodeColor(d)).darker(0.5))
        .attr('stroke-dasharray', d => d.source_file === 'system_generated' ? '3,2' : null);

    labels = node.append('text')
        .text(d => truncate(d.content, 20))
        .attr('dy', d => -(getRadius(degree[d.id] || 0) + 4));

    node.on('click', (e, d) => { e.stopPropagation(); selectNode(d); });
    svg.on('click', () => { selectedNode = null; node.classed('selected', false); resetOpacity(); closePanel(); });

    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    document.getElementById('search').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        if (!q) { applyFilter(); return; }
        node.style('opacity', d => d.content.toLowerCase().includes(q) ? 1 : 0.08);
        labels.style('opacity', d => d.content.toLowerCase().includes(q) ? 1 : 0.08);
        link.style('opacity', 0.03);
        const matches = allNodes.filter(n => n.content.toLowerCase().includes(q));
        if (matches.length === 1) selectNode(matches[0]);
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.type;
            applyFilter();
        });
    });

    document.getElementById('timeline-btn').addEventListener('click', () => {
        timelineMode = !timelineMode;
        document.getElementById('timeline-btn').classList.toggle('active', timelineMode);
        if (timelineMode) enterTimeline(); else exitTimeline();
    });

    const panel = document.getElementById('panel');
    const handleZone = document.getElementById('panel-handle-zone');
    let startY = 0, panelDragging = false;
    handleZone.addEventListener('touchstart', e => { panelDragging = true; startY = e.touches[0].clientY; panel.style.transition = 'none'; });
    handleZone.addEventListener('touchmove', e => { if (!panelDragging) return; const dy = e.touches[0].clientY - startY; if (dy > 0) panel.style.transform = `translateY(${dy}px)`; });
    handleZone.addEventListener('touchend', e => { if (!panelDragging) return; panelDragging = false; panel.style.transition = 'transform 0.3s ease'; if (e.changedTouches[0].clientY - startY > 80) { panel.classList.remove('open'); panel.style.transform = ''; } else { panel.style.transform = ''; } });
    handleZone.addEventListener('click', e => { e.stopPropagation(); panel.classList.toggle('open'); });

    function fitGraph() {
        const bounds = g.node().getBBox();
        if (bounds.width === 0) return;
        const pad = 60;
        const scale = Math.min((W - pad) / bounds.width, (H - pad) / bounds.height) * 0.85;
        const tx = W/2 - (bounds.x + bounds.width/2) * scale;
        const ty = H/2 - (bounds.y + bounds.height/2) * scale;
        svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(Math.min(scale, 1.5)));
    }
    setTimeout(fitGraph, 500);
    setTimeout(fitGraph, 2000);
    setTimeout(() => { simulation.alphaTarget(0); fitGraph(); }, 4000);
}

function applyFilter() {
    if (activeFilter === 'all') { node.style('opacity', 1); labels.style('opacity', 1); link.style('opacity', null); return; }
    const matchIds = new Set(allNodes.filter(n => n.type === activeFilter).map(n => n.id));
    const connected = new Set(matchIds);
    allEdges.forEach(e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.source;
        const tid = typeof e.target === 'object' ? e.target.id : e.target;
        if (matchIds.has(sid)) connected.add(tid);
        if (matchIds.has(tid)) connected.add(sid);
    });
    node.style('opacity', d => matchIds.has(d.id) ? 1 : (connected.has(d.id) ? 0.3 : 0.05));
    labels.style('opacity', d => matchIds.has(d.id) ? 1 : (connected.has(d.id) ? 0.3 : 0.05));
    link.style('opacity', e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.source;
        const tid = typeof e.target === 'object' ? e.target.id : e.target;
        return (matchIds.has(sid) || matchIds.has(tid)) ? 0.6 : 0.02;
    });
}

function enterTimeline() {
    const W = window.innerWidth, H = window.innerHeight;
    const maxDepth = d3.max(allNodes, d => d._depth) || 1;
    const margin = 100;
    const byDepth = {};
    allNodes.forEach(n => { if (!byDepth[n._depth]) byDepth[n._depth] = []; byDepth[n._depth].push(n); });
    allNodes.forEach(n => {
        const col = byDepth[n._depth];
        const idx = col.indexOf(n);
        const ySpacing = Math.min(50, (H - margin * 2) / col.length);
        n.fx = margin + (n._depth / maxDepth) * (W - margin * 2);
        n.fy = H/2 - (col.length - 1) * ySpacing / 2 + idx * ySpacing;
    });
    simulation.alpha(0.5).restart();
    setTimeout(() => {
        const bounds = g.node().getBBox();
        if (bounds.width === 0) return;
        const pad = 80;
        const scale = Math.min((W - pad) / bounds.width, (H - pad) / bounds.height) * 0.85;
        const tx = W/2 - (bounds.x + bounds.width/2) * scale;
        const ty = H/2 - (bounds.y + bounds.height/2) * scale;
        svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(Math.min(scale, 1.2)));
    }, 600);
}

function exitTimeline() { allNodes.forEach(n => { n.fx = null; n.fy = null; }); simulation.alpha(0.8).restart(); }
function getRadius(deg) { return Math.max(4, Math.min(16, 4 + deg * 1.5)); }
function truncate(s, n) { return !s ? '' : s.length > n ? s.slice(0, n) + '…' : s; }

function selectNode(d) {
    selectedNode = d;
    node.classed('selected', n => n.id === d.id);
    const connected = new Set([d.id]);
    allEdges.forEach(e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.source;
        const tid = typeof e.target === 'object' ? e.target.id : e.target;
        if (sid === d.id) connected.add(tid);
        if (tid === d.id) connected.add(sid);
    });
    node.style('opacity', n => connected.has(n.id) ? 1 : 0.1);
    labels.style('opacity', n => connected.has(n.id) ? 1 : 0.1);
    link.style('opacity', e => {
        const sid = typeof e.source === 'object' ? e.source.id : e.source;
        const tid = typeof e.target === 'object' ? e.target.id : e.target;
        return (sid === d.id || tid === d.id) ? 0.8 : 0.03;
    });
    showPanel(d);
}

function showPanel(d) {
    const panel = document.getElementById('panel');
    const content = document.getElementById('panel-content');
    const c = getNodeColor(d);
    const typeBadge = `<span class="node-type-badge" style="background:${c}33;color:${c}">${d.type}</span>`;
    const parents = allEdges
        .filter(e => (typeof e.target === 'object' ? e.target.id : e.target) === d.id)
        .map(e => { const pid = typeof e.source === 'object' ? e.source.id : e.source; return { node: allNodes.find(n => n.id === pid), edge: e }; })
        .filter(p => p.node);
    const children = allEdges
        .filter(e => (typeof e.source === 'object' ? e.source.id : e.source) === d.id)
        .map(e => { const cid = typeof e.target === 'object' ? e.target.id : e.target; return { node: allNodes.find(n => n.id === cid), edge: e }; })
        .filter(c => c.node);
    let html = `
        <div class="panel-label">Thought ${typeBadge} <span style="color:#555;font-size:9px;margin-left:8px;">depth ${d._depth}</span></div>
        <div class="panel-text" style="font-size:16px;font-weight:500;">${d.content}</div>
        <div class="panel-meta">Confidence: ${d.confidence} · ${d.source_file === 'system_generated' ? '🤖 AI Generated' : '🧠 Human'}</div>
    `;
    if (parents.length) {
        html += `<div class="panel-label">Derived From (${parents.length})</div>`;
        parents.forEach(p => { const reason = p.edge.reasoning ? `<div class="chain-reason">${p.edge.reasoning}</div>` : ''; html += `<div class="chain-step"><div class="chain-content">${p.node.content}</div>${reason}</div>`; });
    }
    if (children.length) {
        html += `<div class="panel-label">Leads To (${children.length})</div>`;
        children.forEach(c => { const reason = c.edge.reasoning ? `<div class="chain-reason">${c.edge.reasoning}</div>` : ''; html += `<div class="chain-step"><div class="chain-content">${c.node.content}</div>${reason}</div>`; });
    }
    if (!parents.length && !children.length) {
        html += `<div class="panel-label">Connections</div><div class="panel-meta">Orphan node — no derivation edges</div>`;
    }
    content.innerHTML = html;
    panel.classList.add('open');
}

function closePanel() { document.getElementById('panel').classList.remove('open'); }
function resetOpacity() { node.style('opacity', 1); labels.style('opacity', 1); link.style('opacity', null); }
function dragstart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragend(e, d) { if (!e.active) simulation.alphaTarget(0); if (!timelineMode) { d.fx = null; d.fy = null; } }
</script>
</body>
</html>
