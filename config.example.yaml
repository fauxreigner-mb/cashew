# Cashew Configuration Example
# Copy this to config.yaml and customize for your setup
# Generated by: python scripts/cashew_init.py

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
database:
  # Where to store your thought graph
  path: "./data/graph.db"
  # or for global install: "${HOME}/.cashew/data/graph.db"
  
  # Backup directory for automatic backups
  backup_dir: "./data/backups"
  
  # Enable automatic daily backups
  auto_backup: true

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================
models:
  # Embedding model for semantic similarity search
  embedding:
    # Model name - choose based on your provider:
    name: "all-MiniLM-L6-v2"              # For local/sentence-transformers
    # name: "text-embedding-ada-002"      # For OpenAI
    # name: "text-embedding-3-small"      # For OpenAI (cheaper)
    
    # Provider - determines how embeddings are computed:
    provider: "sentence-transformers"     # Local, private, no API key needed
    # provider: "openai"                  # Requires OPENAI_API_KEY
    
    # Local model cache directory
    cache_dir: "./models"

  # Note: Cashew doesn't call LLMs directly
  # LLM access comes from the orchestrator (OpenClaw) via model_fn parameters
  # Configure your LLM provider in OpenClaw or your orchestration layer

# =============================================================================
# DOMAIN CONFIGURATION  
# =============================================================================
domains:
  # Default domain for uncategorized thoughts
  default: "general"
  
  # User domain - things the human user said/decided/believes
  user: "user"
  
  # AI domain - AI analysis/suggestions/hypotheses  
  ai: "ai"
  
  # Available domain classifications for organizing thoughts
  # Customize these for your life/work areas:
  classifications:
    - personal     # Personal life, relationships, health, etc.
    - work         # Professional projects, career, etc.
    - projects     # Side projects, learning, hobbies
    - learning     # Study notes, insights from reading
    - system       # Meta-thoughts about the system itself
    
  # Enable automatic domain classification during extraction
  auto_classify: true
  
  # Enable domain separation (recommended)
  separation_enabled: true

# =============================================================================
# NODE TYPE TAXONOMY
# =============================================================================
node_types:
  # Core types (always available) - customize descriptions as needed
  core:
    belief: "a held opinion or conviction"
    insight: "a non-obvious connection or pattern discovered"
    decision: "a commitment or choice made"
    observation: "a factual pattern noticed"  
    fact: "a concrete verifiable fact"
    
  # Add domain-specific types here:
  custom:
    # Examples for different domains:
    # person: "a specific individual with relationships"
    # org: "an organization, company, or institution"
    # deal: "a business transaction or investment"
    # thesis: "an investment or strategic thesis"
    # network: "a network, protocol, or infrastructure"
    # location: "a meaningful place or geography"
    # event: "a significant occurrence or milestone"

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================
performance:
  # Context generation parameters
  token_budget: 2000           # Max tokens for context injection
  top_k_results: 10            # Number of top similar nodes to retrieve
  walk_depth: 2                # How deep to walk the graph for context
  
  # Similarity and scoring thresholds
  similarity_threshold: 0.3    # Minimum similarity for search results
  novelty_threshold: 0.82      # Threshold for detecting novel insights
  confidence_threshold: 0.7    # Minimum confidence for accepting extractions
  
  # Hybrid retrieval scoring weights (must sum to ≤ 1.0)
  access_weight: 0.2           # Weight for access frequency scoring
  temporal_weight: 0.1         # Weight for recency scoring
  # embedding_weight: 0.7      # (calculated as remainder)
  
  # Clustering parameters
  clustering_eps: 0.35         # DBSCAN epsilon for clustering
  
  # Think cycle parameters
  think_cycle_nodes: 5         # Number of nodes to use in think cycles
  max_think_iterations: 3      # Maximum thinking iterations per cycle

# =============================================================================
# INTEGRATION SETTINGS
# =============================================================================
integration:
  # OpenClaw integration (if running inside OpenClaw)
  openclaw:
    # Path to OpenClaw auth profiles
    auth_profile_path: "${HOME}/.openclaw/agents/${OPENCLAW_AGENT:-main}/agent/auth-profiles.json"
    
    # OpenClaw workspace path
    workspace_path: "${HOME}/.openclaw/workspace"
    
    # Session directory for automatic extraction
    session_dir: "${HOME}/.openclaw/sessions"

# =============================================================================
# SLEEP & CONSOLIDATION
# =============================================================================
sleep:
  # Enable automatic sleep cycles
  enabled: true
  
  # Sleep cycle frequency:
  frequency: "6h"              # Options: "6h", "12h", "manual"
  
  # Cron schedule for automatic sleep cycles
  # "0 */6 * * *" = every 6 hours
  # "0 */12 * * *" = every 12 hours  
  # null = manual only
  schedule: "0 */6 * * *"

# =============================================================================
# GARBAGE COLLECTION
# =============================================================================
gc:
  # Garbage collection mode
  mode: "soft"                 # "soft", "hard", or "off"
  
  # Relevance threshold below which nodes are eligible for GC
  threshold: 0.05
  
  # Grace period - days since last_accessed before eligible
  grace_days: 7
  
  # Protected node types (never garbage collected)
  protect_types:
    - seed
    - core_memory
  
  # Penalty multiplier for think-cycle generated nodes
  think_cycle_penalty: 1.5

# =============================================================================
# LOGGING
# =============================================================================
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Log format string
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Log file location
  file: "./logs/cashew.log"

# =============================================================================
# FEATURE FLAGS
# =============================================================================
features:
  # Enable/disable various cashew features
  auto_extraction: true        # Automatic extraction from conversations
  think_cycles: true           # Periodic insight generation
  sleep_cycles: true           # Deep memory consolidation  
  decay_pruning: true          # Natural forgetting of unused nodes
  pattern_detection: true      # Cross-domain pattern discovery

# =============================================================================
# ENVIRONMENT VARIABLE OVERRIDES
# =============================================================================
# Any setting can be overridden with environment variables using ${VAR} syntax:
# 
# database:
#   path: "${CASHEW_DB_PATH:-./data/graph.db}"
#
# Available environment variables:
# - CASHEW_DB_PATH: Override database path
# - CASHEW_BACKUP_DIR: Override backup directory  
# - CASHEW_MODEL_CACHE: Override model cache directory
# - CASHEW_USER_DOMAIN: Override user domain name
# - CASHEW_AI_DOMAIN: Override AI domain name
# - CASHEW_LOG_FILE: Override log file path
# - CASHEW_TOKEN_BUDGET: Override token budget
# - CASHEW_TOP_K: Override top-k results
# - CASHEW_WALK_DEPTH: Override graph walk depth
# - CASHEW_ACCESS_WEIGHT: Override access frequency weight  
# - CASHEW_TEMPORAL_WEIGHT: Override temporal recency weight
# - CASHEW_EMBEDDING_MODEL: Override embedding model name

# =============================================================================
# USAGE EXAMPLES
# =============================================================================
# 
# Extract knowledge from text:
#   python scripts/cashew_context.py extract --input "Your insight here"
#
# Search your knowledge:  
#   python scripts/cashew_context.py context --hints "topic keywords"
#
# Run a think cycle:
#   python scripts/cashew_context.py think
#
# Domain-specific search:
#   python scripts/cashew_context.py context --tags "work" --hints "project management"
#
# Export dashboard:
#   python scripts/export_dashboard.py data/graph.db dashboard/data/graph.json